body:
  text: 泰西水法卷三明熊三拔撰用雨雪之水為法一種水庫記水庫者積水之處也澤國下地水之所都平原易野厥田中中引河鑿井斯足用焉若乃重山復嶺陡澗迅流乘水之急激而自上廢人用器厥利尤大矣别有天府金城居高乘險江河溪澗境絶路殊鑿井百尋盈車載綆時逢亢旱涓滴如珠或乃絶徼孤懸恆須逺汲長圍久困人馬乏絶若斯之類世多有之臨渴為謀豈有及哉計莫如恆儲雨雪之水可以御窮而人情狃近未或先慮及其巳至坐稿而已亦有依山掘地造作塘池以為旱備而彌旬不雨已成龜坼徒傷挹注之易窮不悟滲漏之實多矣西方諸國因山為城者其人積水有如積穀穀防紅腐水防漏泄其為計慮亦略同之以故作為水庫率令家有三年之畜雖遭大旱遇強敵莫我難焉又上方之水比於地中陳久之水方於新汲其蠲煩去疾益人利物往往勝之彼山城之人遇江河井泉之水猶鄙不肯嘗也今以所聞造作法著於篇請先諗之秦晉諸君子焉水庫者水池也曰庫者固之其下使無受泄也羃之其上使無受損也四行之性土為至乾甚於火矣水居地中風過損焉日過損焉夏之日大旱金石流土山焦而水獨存乎故固之故羃之水庫之事有九一曰具具者庀其物也二曰齊齊所以為之和也三曰鑿鑿所以為之容也四曰築築所以為之地也五曰塗塗所以為之固守也六曰蓋蓋所以為之羃覆也七曰注注所以為之積也八曰挹挹所以受其用也九曰修修所以為之彌縫其闕也注曰羃防耗損亦防不潔古人井故有羃易曰井收勿幕齊與劑同一曰具水庫之物有六以備築也蓋也塗也築與蓋之物有三曰方石曰瓴甋曰石卵塗之物有三曰石灰曰砂曰瓦屑塗之物三合謂之三和之灰或砂或瓦去一焉謂之二和之灰煉灰之石或青或白欲密理而色潤否者疏而不昵煉之以薪或石炭焉火不絶二日有半而後足試之法先取一石權之雜衆石而煉之既成而出之權之損其初三分之一此石質美而火齊得也砂有三種或取之湖或取之地或取之海海為上地次之湖又次之砂有三色赤為上黑次之白又次之辨砂之法有三揉之其聲楚楚焉純砂也諦視之各有廉隅圭角純砂也散之布帛之上抖擻之悉去之不留塵坌者純砂也否則有土雜焉以為齊則不固瓦之屑以出陶之毁瓦瓴甋鐵石之杵臼舂之而篩之無新焉而用其舊者水濯之日暴之極乾而後舂之而篩之篩之為三等細與石灰同體為細屑稍大焉與砂同體為中屑再篩之餘其大者如菽為查注曰方石瓴甋者以豫為牆為蓋二物皆無定度也為牆之石取正方焉廣狹短長厚薄無定度牆厚則堅堅則久為蓋者或穹之穹之石合之其圓半規穹之法有三詳見下方也石卵者鵝卵之石也以豫為底也無之以小石代之大者無過一斤小者任雜焉凡石卵或小石欲堅潤而密理否者不固眤黏也二日有半三十時足也陶窑竈也瓴甋磚也凡瓦之土勝磚之土用磚則謹擇之篩俗作篩羅也查滓也查無用篩擇其過大者去之三和之灰今匠者多用之其一則土也用土不堅以瓦屑故勝之以後法為之劑又勝之西國别有一物似土非土似石非石生於地中掘取之大者如彈丸小者如菽色黃黑孔竅周通狀如蛀窠儼然石也而體質甚輕揉之成粉舂以代砂或代瓦屑灰汁在其空中委宛相入堅凝之後逾於鋼鐵近數十年前有發故水道者啓土之後鍬钁不入百計無所施既而穴其下方乃壞墮焉視其甃塗之灰用是物也厚半寸許耳此道由來甚久以厯年計之在漢武之世矣後此凡用和灰甚貴是物焉或作室模和灰塗之崇閎窈窕惟意所為既成之後絶勝冶銅鑄鐵矣然所在不乏計秦晉隴蜀諸高陽之地必多有之其形大段如浮石而顆細色赤黃質脆為異耳以本草質之殆土殷孽之類也其生在乾燥之處土作硫黃氣者或産硫黃者或近溫泉者火石者火井者或地中時出磷火者即有之求之法視其處草不蕃盛茸茸短瘠又淺草之中忽有少分如斗許如席許大不生寸草者依此掘地數尺當可得也西國名為巴初剌那求得之大利於土石之工或并無瓦屑及砂以青白石末代之其細大之等與瓦屑同二曰齊凡齊以斗斛槩其物水和之三分其凡而灰居一砂居二湅之如糜謂之甃齊三分其甃齊加水一焉而調之謂之築齊塗之齊有三湅之皆如糜四分其凡而瓦查居二砂居一灰居一謂之初齊三分其凡而中屑居二灰居一謂之中齊五分其凡而細屑居三灰居二謂之末齊凡湅齊熟之又熟無亟於用無惜於力日再湅五日而成為新齊新齊積之恆以水潤之下濕之處窖藏而土封之久而益良注曰凡量灰必出窑之灰凡量瓦屑必出臼之屑凡量砂必日暴之砂皆言乾也如糜者今匠人所用甃牆塗牆挑而槩之之劑也太燥則不附太濕則不居加水為築劑則如稀糜沃而灌之之劑也凡治宫室築城垣造壙域皆以諸劑斟酌用之和之水以泉水江水雨水雜鹵與鹻勿用也雪水之新者勿用也凡總數也三曰鑿池有二曰家池曰野池家以共家野以共野共家者飲饌焉澡滌焉共野者畜牧焉溉灌焉為家池計衆霤而曲聚之承而鍾之為野池計岡阜原田水道之委而聚之而鍾之為家池必二以上代積焉代用焉為野池專可也隨積而用之皆計嵗用之數而為之容積二年以上者遞倍之或倍其容或倍其處為家池平其底中底而為之坎坎深二尺以渟其垢三分其底之徑以其一為坎之徑牆方則稱圜則固大者圜之小者方之大者圜而方者小則不畏深也牆之周或壁立或下侈而上弇之侈弇之數無定度雖為之土囊之口可也若上侈而下弇則寡容也中侈而上下弇則難為牆也無所取之或為之復池限之以牆中牆而為之竇以通之小者𣙗之大者閘之互輸寫之可抒清而去濁也代積而代用也若山麓原田陂陀之地則為壺漏之池高下相承互輸寫之為野池利淺以羣飲六畜以溉田方其牆迤其一面以為塗欲為深者迤其底漸深之無坎為野池擇磽確之地不宜稼而水輳焉者可也是化無用為有用也注曰共與供同霤簷溝也容者通高下廣狹所容受多寡之數也度池尺寸計容多寡用盤量倉窖術在九章算之粟米篇專獨也遞倍者二年則二倍三年則三倍也倍容者倍其大倍處者倍其多也倍大法亦用立方立圓術酌量作之在九章算之少廣篇方則稱者或稱其室或稱其庭兩方相稱也方牆而大懼或墮焉圓如井周相恃為固上弇不墮亦此理也侈廣弇斂也如本篇一圖之甲乙丙丁方池也辛壬癸子圓池也二形之外或有為長方者方之屬也有六角八角以上諸角形者圓之屬也惟所為之未暇詳也戊己丑寅底坎也乙庚辛壬壁立之牆也卯辰午未戌房氐亢上弇之池也卯未戌角土囊之口也復池兩池並也牆之竇多寡大小高下任意作之𣙗木杙也凡閘與𣙗或旁泄者附之以暖木之皮而塞之壺漏之池者從上而下位置如刻漏之壺其開竇輸寫亦若漏水相承也如本篇二圖之甲乙復池也丙丁限牆也午壬申竇也戊己庚辛壺漏之復池也壬其竇也癸子丑寅卯辰壺漏之三復池也酉與戌皆其竇也三以上任意作之其連接之處如庚至己丑至子淺深高下亦任意作之迤之以為塗令人畜皆邐迤而下恆及水際也凡岡阜之下山陵之麓其地瀝脂故不宜稼其勢建瓴水則輳之牲降於阿取飲既便掣以灌田趨下易達也四曰築築有二下築底旁築牆築底者既作池平其底則以木杵杵之或以石砧砧之杵之砧之欲其堅也依池之周而為之牆或方石焉或瓴甋焉甃之以甃齊之灰甃必乘其界牆量池之小大淺深而為之厚不厭厚若復池則為共池而中甃其限牆仍甃為行水之竇壺漏之復池則各為池而穿行水之竇也牆畢以鵝卵之石或小石墊之其底厚五寸以上不厭厚既墊之復杵之或砧之不厭堅無惜其力亦欲其平也既堅既平以築齊之灰灌之又灌之滿焉實焉平焉浮於石而止復杵之或砧之有隙焉復灌之滿實平而止中底之坎亦杵之亦牆之亦墊之而灌之如法作之凡底與牆之交砧杵或不及焉則以邊杵築之其墊與灌必謹察之而加功焉壺漏之竇居水之衝必謹察之而加功焉凡牆皆以方長之石為之緣若遇大石焉而鑿之池以石為之底與牆與緣徑塗之有闕焉而為之縫亦杵之而牆之而緣之而墊之而灌之如法作之野池或土或石皆如之注曰乘界俗言騎縫也緣池面壓口也縫補也本篇三圖之甲乙丙木杵也丁邊杵也戊石砧也巳辛已庚甃牆也庚辛石墊也本篇二圖之甲乙即其池也以意度之江海之濱平原易野土疏善壞必以甃牆處於山者如秦如晉厥土騂剛陶復陶穴壁立不墮若斯之處掘地為池雖無甃牆而徑塗之不亦可乎同志者請嘗試之五曰塗築畢候池之底既乾其十之八掃除之過乾則水沃之而後塗之塗之先以初齊厚五分池大者加二分之一池之底及周連塗之連塗之則周與底之交無罅也塗畢以木擊擊之欲其平以實也次日又擊之有罅焉以鐵槩槩之乾則以水沃而槩之無罅而止三日以後皆如之俟其乾十分之六而塗之中齊中齊之厚減其初二分之一亦擊之槩之次日以後皆如之候其乾十分之六而塗之末齊末齊之厚減其次二分之一亦擊之槩之次日以後皆如之候其乾十分之五以鐵槩摩之有罅焉以水沃而摩之周與底中坎之周與底復池之水竇皆同之凡周與底之交若竇必謹察之而加功焉凡塗瓴甋之牆或燥而不眤以石灰之水遍灑之作堊色乾而後塗之則眤凡塗石池與土池野池與家池皆同法凡擊欲其堅如石也摩欲其密如脂也欲其瑩如鏡也堅密以瑩更千萬年不泄也注曰本篇四圖之甲木擊也乙鐵槩也凡三和之灰無所不可用欲厚則四塗之五塗之任意加之四塗者初一中二末一五塗者初一中三末一末塗以飾宫室之牆欲令光潤者以雞子清或桐油和之如法擊摩之欲設色以所用色代瓦屑而和之石色為上草木為下六曰蓋家池之蓋有二曰平之曰穹之平有二曰石版曰木版皆平而羃之為之孔以出入水穹有三曰券穹曰斗穹曰蓋穹方池皆券穹正方者或為斗穹圜池之屬皆蓋穹劵穹者形覆券也又如截竹析其半而覆之兩和為之立牆斗穹者形覆斗也方其隅而四牆之趨其頂也皆以圜蓋穹者其形蓋也中高而旁周皆下垂凡穹之空皆半規皆去緣尺而甃之甃之法皆架木以為模緣而成之甃以石則治之以趨規若瓴甋亦以趨規之模造之無之則以甃齊加損而合之穹之下為之竇以出入水在野者或穹之不則苫之或露之注曰平蓋出入之孔有二一居中當底坎之上以挹其渟汗也一近池之緣注水入之挈水出之大小皆無定度也本篇四圖之丙丁戊己庚券穹也丁戊戊己方池兩緣也丁丙戊和牆也丙庚穹背也辛壬癸子丑斗穹也辛壬癸丑方池緣也子穹頂也依丑辛直線為牆漸狹而上以趨子其丑子辛子皆圓線餘三同之而結於子也寅卯辰午未蓋穹也寅卯未辰圓池緣也午穹頂也旁周趨上皆為圓線其全空正如立圓之半也空皆半規者謂丁丙戊丑子壬未午寅皆半圜形也如是則固去緣尺者池口為道將跨池以居梁也趨規之勢今工人謂之橘房形也七曰注凡家池以竹木為承霤展轉達之其將入於池也為之露池迎輻輳之水暫積焉以渟其滓既澱而後輸之露池之緣為竇焉以入於池露池之底為竇焉而他泄之皆以閘或以𣙗而節宣之凡雨之初零也必有滓也長夏之雨也必有酷熱之氣也則啓其下竇而池泄焉度可入也則塞之啓其上竇而輸之若水之來與地平不能為下竇者則澱其滓以時出之為新池候乾極而注之新注之水不食也既浹月更注之而後食之為二池者嵗食經年之水為三池者嵗食三年之水是恆得陳水焉水陳者良若為復池者既注之澄而後啓中牆之竇而輸之空池復注之如是更積之是恆得澄水焉凡池既盈而閉之則畜之金魚數頭是食水蟲或鯽魚是食水垢野池注之山原之水遂以畜諸魚可也魚之性有與牛羊相長者也注曰澱下凝也露池不羃也如本篇五圖之甲乙丙露池也丁上竇也戊下竇也新注不食灰氣入焉味惡也魚與牛羊相長者如鯶食羊豕之惡而肥鰱食鯶之惡而肥也八曰挹家池之水深其挈之則以龍尾之車更深者為之玊衡之車恆升之車無立其足則以大石為墜關巨木而置之無夾其筒則跨池為梁而置之既出而為槽以達之若挈瓶施繘焉亦從其梁中底之坎既澱焉為吸筒以去其澱吸筒者截竹而通其節或卷銅錫焉兩端塞之中底而為之孔孔之徑當底三分之一上端之旁為之孔無過三分一指可掩也掩其上孔而入之水至於底而啓之則自下孔入者皆澱也既盈掩而出之而傾之如是數入焉澱盡而止凡施筒亦從其梁野池之灌畦若田也亦以三車挈之置車亦如之池大者無跨其梁則跨之隅注曰足謂龍尾之下樞也玊衡之雙筒恆升之筒底也筒者玊衡之中筒恆升之筒上端也繘汲井繩也本篇五圖之己庚辛石關巨木也壬癸梁也子丑吸筒也寅吸筒之底孔也卯旁孔也未申梁跨其隅也九曰修池無新故或泄焉修之則用細潤之石舂之篩之與灰同體亦與同量煮水百沸而投之和之日乾之復舂之篩之煮水投之如是四焉舂而篩之牛乳汁和之以塗其隙或以生漆和而塗之注曰同體等細也同量等分也泰西水法卷三
