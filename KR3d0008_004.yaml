body:
  text: 泰西水法卷四明熊三拔撰水法附餘高地作井未審泉源所在其求之法有四第一氣試當夜水氣恆上騰日出即止今欲知此地水脈安在宜掘一地窖於天明辨色時人入窖以目切地望地面有氣如煙騰騰上出者水氣也氣所出處水脈在其下第二盤試望氣之法曠野則可城邑之中室居之側氣不可見宜掘地深三尺廣長任意用銅錫盤一具清油微微遍擦之窖底用木高一二寸以搘盤偃置之盤上乾草蓋之草上土蓋之越一日開視盤底有水欲滴者其下則泉也第三缶試又法近陶家之處取瓶缶坯子一具如前銅盤法用之有水氣沁入瓶缶者其下泉也無陶之處以土甓代之或用羊絨代之羊絨者不受濕得水氣必足見也第四火試又法掘地如前篝火其底煙氣上升蜿蜒曲折者是水氣所滯其下則泉也直上者否鑿井之法有五第一擇地鑿井之處山麓為上䝉泉所出隂陽適宜園林室屋所在向陽之地次之曠野又次之山腰者居陽則太熱居隂則太寒鑿井者察泉水之有無斟酌避就之第二量淺深井與江河地脈通貫其水淺深尺度必等今問鑿井應深幾何宜度天時旱潦河水所至酌量加深幾何而為之度去江河逺者不論第三避震氣地中之脈條理相通有氣伏行焉强而密理中人者九竅俱塞迷悶而死凡山鄉高亢之地多有之澤國鮮焉此地震之所由也故曰震氣凡鑿井遇此覺有氣颯颯侵人急起避之俟泄盡更下鑿之欲候知氣盡者縋燈火下視之火不滅是氣盡也第四察泉脈凡掘井及泉視水所從來而辨其土色若赤埴土其水味惡赤埴黏土也中為甓為瓦者是若散沙土水味稍淡若黑墳土其水良黑墳者色黑稍黏也若沙中帶細石子者其水最良第五澄水作井底用木為下磚次之石次之鉛為上既作底更加細石子厚一二尺能令水清而味美若井大者於中置金魚或鯽魚數頭能令水味美魚食水蟲及土垢故試水美惡辨水高下其法有五凡江河井泉雨雪之水試法並同第一煮試取清水置淨器煮熟傾入白磁器中候澄清下有沙土者此水質惡也水之良者無滓又水之良者以煮物則易熟第二日試清水置白磁器中向日下令日光正射水視日光中若有塵埃絪縕如遊氣者此水質惡也水之良者其澄徹底第三味試水元行也元行無味無味者真水凡味皆從外合之故試水以淡為主味佳者次之味惡為下第四稱試有各種水欲辨美惡以一器更酌而稱之輕者為上第五紙帛試又法用紙或絹帛之類色瑩白者以水蘸而乾之無迹者為上也以水療病其法有二第一溫泉溫泉可以療病者何也凡治病之藥皆以其味四元行皆無味故真水不能為藥以水為藥必藉他味焉溫泉出於硫黃硫黃為藥多所主治而過於酷烈醫方謂其效雖緊其患更速難可服餌溫泉本水而得硫之精氣故為勝之又溫泉療病用之薰浴者什九用之湯飲者什一薰沐者其熱毒不致入於腸胃而性力却能達於腠理則利多而害少焉第同一溫泉性味各異其所主治亦悉不同西國一大郡其山間所出溫泉數十道每道各有主治昔有國主徴集名醫辨其性理又多用罪囚患諸對症者纍試纍驗然後定為方術是何泉水本何性味主何疾病作何薰蒸或是沐浴或是湯飲用何藥物以為佐助設立薰蒸器具沐浴盆池刋刻石碑詳著方法樹之本所凡染病者依方療治多得差焉今溫泉所在有之亦有沐浴而得愈疾者若更講求試驗如前所云所拯救疲癃當復不少也第二藥露凡諸藥係草木果蓏穀菜諸部具有水性者皆用新鮮物料依法蒸餾得水名之為露今所用薔薇露則以薔薇花作之其他藥所作皆此類也凡此諸露以之為藥勝諸藥物何者諸藥既乾既久或失本性如用陳米作酒酒多無力小西洋用葡萄乾作酒味亦薄焉若以諸藥煎為湯飲味故不全間有因煎失其本性者若作丸散并其查滓下之亦恐未善凡人飲食蓋有三化一曰火化烹煮熟爛二曰口化細嚼緩咽三曰胃化蒸變傳送二化得力不勞於胃故食生食冷大嚼急咽則胃受傷也胃化既畢乃傳於脾傳脾之物悉成乳糜次乃分散達於周身其上妙者化氣歸筋其次妙者化血歸脈用能滋益精髓長養肌體調和榮衛所云妙者飲食之精華也故能宣越流通無處不到所存糟粕乃下於大腸焉今用丸散皆乾藥合成精華已耗又須受變於胃傳送於脾所沁入宣布能有幾何其餘悉成糟粕下墜而已病人脾胃有如老弱秖應坐享見成飲食而乃令操臼執爨責以化治乎今用諸水皆諸藥之精華不待胃化脾傳已成微妙裁下於咽即能流通宣越沁入筋脈禆益𢎞多又蒸餾所得既於諸物體中最為上分復得初力則氣厚勢大焉不見燒酒之味醲於他酒乎西國市肆中所鬻藥物大半是諸露水每味用器盛置醫官止主立方持方詣肆和藥付之然且有不堪陳久者國主及郡邑長吏嵗時遣官巡視諸肆令取過時之藥是水料者即傾棄之是乾料者即雜燒之蓋慮陳久之藥無益於疾或反致損也其製法先造銅鍋平底直口下稍廣上稍斂不論大小皆高四五寸次造錫兜牟用鉛或銀尤勝也製如兜牟上為提梁下口適合銅鍋之口罩在其外錫口內去口一寸許周遭作一錫槽槽底欲平無令積水錫口外去口一寸許安一錫管管通於槽其勢斜下管之底平於槽之底寧下無高以利水之出也次造竈與常竈同法安鍋之處用大磚蓋之四旁以磚甃成一窩塗之黏土以銅鍋底為模銅鍋底入於竈窩深二寸窩底大磚并泥厚二寸欲作諸露以物料治淨長大者銼碎之花則去蒂與心置銅鍋中不須按實按實氣不上行也置銅鍋入竈窩內兜牟蓋之文火燒之磚熱則鍋底熱熱氣升於兜牟即化為水沿兜牟而下入於溝出於管以器承之兜牟之上以布蓋之恆用冷水濕之氣升遇冷即化水候物料既乾而易之所得之水以銀石瓷器貯之日晒之令減其半則水氣盡能久不壞玻瓈尤勝透日易耗故也他凡為香以其花草作之如薔薇木樨茉莉梅蓮之屬凡為味以其花草作之如薄荷茶茴香紫蘇之屬諸香與味用其水皆勝其物若藥肆多作諸藥露者則為大竈高數層每層置數器凡數十器或平作大竈置數十器皆爇火一處數十器悉得水焉其薪火人力俱省數倍矣注曰如本圖之甲壬癸子銅鍋也乙庚辛兜牟也戌提梁也庚辛錫口也戊己槽也丙丁管也丑卯辰竈也丑寅竈面也申酉窩也申酉與壬癸相入甲子與庚辛相入也午未竈門也亥角亢大竈也氐房心尾平竈也此外測量水地度形勢高下用以決排江河蓄泄湖淀開濬溝渠疆理田畝捍大患興大利者别為一法或於江湖河海之中欲作橋梁欲作城垣欲作宫室樓臺令千萬年不致圯壞别為一法或於山泉溪澗去城郭數里或數十里乃至百里疏引原泉伏流灌注入於國城或至大內或至官府或至園囿或至人家分枝析脈任意取用别為一法已上三法别有備論兹者專言取水未暇多及泰西水法卷四
