body:
  text: 泰西水法卷二明熊三拔撰用井泉之水為器二種玊衡車記專筩車附玊衡車者井泉挈水之器也既逺江河必資井養井汲之法多從綆缶饔飱朝夕未覺其煩所見高原之處用井灌畦或加轆轤或藉桔橰似為便矣乃俛仰盡日潤不終畝聞三晉最勤汲井灌田旱熯之嵗八口之力晝夜勤動數畝而止他方習惰既見其難不復問井灌之法嵗旱之苗立視其槁饑成已後非殍則流吁可憫矣今為此器不施綆缶非藉轆轤無事桔橰一人用之可當數人若以灌畦約省夫力五分之四高地植糓家有一井縱令大旱能救一夫之田數家共井亦可無饑餓流亡之患若資飲食則童幼一人足供百家之聚矣且不須俛仰無煩提挈畧加幹運其捷若抽故煙火㑹集之地一井之上尚可活一㷀民也玉衡者以衡挈柱其平如衡一升一降井水上出如趵突焉玉衡之物有七一曰雙筩雙筩者水所由代入也二曰雙提雙提者水所由代升也三曰壺壺者水之總也水所由續而不絶也四曰中筩中筩者壺水所由上也五曰盤盤者中筩之水所由出也六曰衡軸衡軸者所以挈雙提下上之也七曰架架者所以居庶物也七物者備斯成器矣更為之機輪焉巧者運之不可勝用也注曰趵突泉水上出也一曰雙筩鍊銅或錫為雙筩其圜中規而上下等半其筩之長以為之徑下有底中底而為之圜孔以其底之半徑為孔之徑筩之旁齊於底而樹之管管外出而上迤也管之容其圜中規管之下端抒之以合於筩開筩之下端為為㨊孔融錫而合之於管管之上端亦抒之既樹之則與筩之邊為平行三分其底之徑以其一為管之徑底之圜孔為之舌以揜之舌者方版方版之旁為之樞底孔之旁為之紐樞入於紐如户焉而開闔之舌之開闔與管之孔無相背也紐居左則管居右舌其合於底也欲密管之孔合於筩之孔欲利而無罅樞紐之動也欲不滯凡水之入也必從其底之孔也有舌焉而開闔之開之則入闔之則不出左開則右闔矣是左入而右不出也是恒有一孔焉入而終無出也故曰雙筩者水所由代入也注曰凡徑皆言圓孔也肉不與焉如本篇一圖甲至乙丙至丁是也半長為徑者徑三寸則筩長六寸如丁丙廣三寸則甲丁長六寸也半徑為孔者徑三寸孔徑一寸五分如丁丙三寸則辛壬一寸五分也上迤者斜迤而上如戊至己丙至庚也抒者斜削之如戊至丙己至庚是也㨊長圓也欲與戊丙之孔合也融錫合之小釬也管之上邊與筩邊平行將以合於壺之下孔也己庚是也三分之一者底徑三寸則管徑一寸未至申之度也方板者丑寅卯午是也樞者卯辰午是也紐者癸子是也舌如槖籥之舌以樞合紐令丑卯之板恒加於辛壬孔之上向丙而開闔之也二曰雙提旋堅木以為砧其圜中規而上下等曷知其中規而上下等也砧之大入於雙筩也欲其密切而無滯也展轉之上下之猶是也斯之謂中規而上下等當砧之心而立之柱三分其砧之徑以其一為柱之徑柱之短長無定度以水之深也井之高也斟酌焉而為之度柱之上端為之方枘而入於衡凡水之入也入於雙筩之孔也孔有舌焉砧升則舌開而水為之入砧降則舌合而水為之不出水之入而不出者舌也舌之開闔者砧也砧之上下者柱也舌闔矣水不出矣砧又下焉水將安之則由筩之管而升於壺左右相禪也故曰雙提者水所由代升也注曰砧形如截䉀本篇一圖酉戌亥角是也其高不言度者趣其入於筩也不轉側動搖而已矣若為鼎足之柱以固之即無厚可也三分之一者砧徑三寸則柱徑一寸如酉角三寸則亢氐一寸也凡雙筩入井近下則水濁近上則水竭故柱之短長宜量水深與井高也枘筍也當房心之上刻而方之為尾箕是也三曰壺鍊銅以為壺壺之容半加於雙筩之容其形㨊圜腹廣而上下弇之弇之度視廣之度殺其十之二當其弇而設之蓋壺之底為㨊圜之長徑設二孔焉皆在其徑孔之㨊圜其大小也與管之上端等融錫而合之壺之兩孔各為之舌而揜之舌之制如筩中之舌也壺之内當兩孔之中而設之紐兩舌之樞悉係焉而開闔之左右相禪也當蓋之中為圜孔焉而合於中筩蓋之合於壺也欲其無罅也既成以鐵為雙環而交纒束之當其合而錮之以錫以備繕治夫水之入於管也左右禪也而終無出也水從管入者以提柱之逼之也則上衝而壺之舌為之開以入於壺水勢盡而彼舌開則此闔矣是代入於壺也而終無出也其代入也壺為之恒滿而上溢其終無出也而有筩之容以俟其底之入也故曰壺者水之總也水所由續而不絶也注曰半加容者如之又加半焉如雙筩共容四升則壺容六升也弇斂也腹廣而上下弇如本篇二圖甲乙丙丁形是也蓋者戊己庚辛也㨊圓之長徑底圖之乙丙是也二孔者未申也酉戌也皆在其徑者二孔之心在乙丙線之上也二孔㨊圓者如酉戌短乾亥長以合於一圖之未申己庚也二舌者寅卯也辰午也紐者子丑也以樞合紐令寅卯之板恒加于未申孔之上向丙而開闔之也辰午加於酉戌亦如之左右相禪也蓋之圓孔庚辛是也蓋合於壺者己戊加於甲丁也雙環纒束者本篇三圖之角亢氐房是也既錮之又束之者水力大而易渫也四曰中筩鍊銅或錫以為中筩中筩之徑與長筩旁管之徑等中筩之下端為敞口以闗於蓋上之孔融錫而合之其長無定度量水之出於井也斟酌焉而為之度或銅錫之中筩裁數尺其上以竹木焉續之竹木之筩之徑必與下筩之徑等其上出之徑寧縮也無贏也水之入於壺也代入也而終無出也則無所復之也必由中筩而上故曰中筩者壺水所由上也注曰中筩者本篇三圖之坎艮庚辛是也上出之徑必縮於下合之徑者所以為出水之勢也五曰盤鍊銅或錫以為盤中盤之底而為之孔以當中筩之上端融錫而合之盤底之旁為之孔而植之管管外出而下迤也盤之容與壺之容等管之徑與中筩之徑等管之長無定度其下迤也及於索水之處也中筩之水其上溢也盤畜之管洩之故曰盤者中筩之水所由出也注曰本篇四圖之甲乙丙丁盤也丙丁為孔以合於中筩之上端上端者三圖之坎艮也底旁之孔者戊己也下迤者己庚也六曰衡軸直木為衡衡之長無過井之徑雙提之柱其相去也視雙筩雙提之上枘入於衡之兩端其相去也視雙提直木為軸軸長於衡而無定度圜其尾去首二尺而圜其徑當徑尾之中而設之鑿當衡之中而設之枘衡衡也軸縱也鑿枘而合之欲其固也軸展側焉衡低昻焉提上下焉左右相禪也故曰衡軸者所以挈雙提下上之也注曰衡之長本篇四圗之壬辛是也枘入於衡者子丑是也軸之長卯午是也卯尾午首辰頸也衡軸鑿枘之合寅是也鑿孔也衡横軸縱卯辰子丑之交加也七曰架井之兩旁為之柱或石焉或瓴甋焉或木焉柱之上端為山口山口者容軸之圜也以利轉也軸之首設之小衡與衡平行也長二尺或三尺小衡之兩端設二木而三合之如句股以小衡為弦句股之交立之柄持其柄而搖之以轉軸也水之中穿井之脇而設之梁横亘焉梁之上為二陷以居雙筩之底欲其固也中其陷而設之孔稍大於雙筩之底孔水所從入也梁居水中其木必榆榆為木也無味水不受之變梁在其下柱在其上車所由孔安而利用也故曰架者所以居庶物也注曰本篇四圖之卯亥也辰乾也柱也當辰卯為山口者以容軸之圓也小衡者申未也三合者未申酉為三角形也酉戌柄也立之柄者立柄於酉戊酉未為直角也坎艮梁也角亢氐房陷也心尾陷中孔也若欲為專筩之車則為專筩專柱而入之中筩如恒升之法而架之而升降之其得水也當玊衡之半井狹則為之注曰專一也架法見恒升篇恒升車記雙升車附恒升車者井泉挈水之器也其用與玉衡相似而更速焉更易焉以之灌畦治田致為利益矣若為之複井井之底為竇而通之以大井瀦水以小井為筩而出之則無用筩也若江河泉澗索水之處過高龍尾之力有不能至則用是車焉挈水以升架槽而灌之或迤而建之以當龍尾恒升者從下入而不出也從上出而不息也恒升之物有四一曰筩筩者水所由入也所以束水而上也二曰提柱提柱者水所由恒升也三曰衡軸衡軸者所以挈提柱上下之也四曰架架者所以居庶物也四物者備斯成器矣更為之機輪焉巧者運之不可勝用也一曰筩刳木以為筩筩之長無定度下端所至居水之中已上則易竭巳下則易濁上端所至出井之上度及於索水之處而止筩之徑無定度因井之大小索水之多寡斟酌焉而為之度筩之容任圜與方其圜中規其方中矩而上下等筩之周以鐵環約之環無定數視筩短長斟酌焉而為之數筩之下端為之底欲其密而無漏也中底而為之孔孔之方圜反其筩若圜筩而方孔七分底之徑以其四為孔之徑若方筩而圜孔七分底之徑以其五為孔之徑孔之上象孔之方圜為之舌而掩之如玉衡之雙筩掩之欲其密而無漏也開闔之欲其無滯也筩之上端為之管管外出而下迤也本廣而末狹也水從孔入焉既入而提柱之勢能以舌掩之既掩而提之提之則從管而出也故曰筩者水所由入也所以束水而上也注曰玉衡之雙筩與中筩為二此則合之筩入於井量井淺深筩長短而置之近上趣恒得水而止近下趣無受濁而止與玉衡同也圓筩用竹尤簡用木則方筩為易焉如本篇一圖甲乙丙丁圓筩也丙丁其底也戊己底方孔也庚辛壬癸方筩也壬癸其底也子丑底圜孔也寅方舌也酉圜舌也甲卯辛卯管也辰午未申之屬環也環之多寡疎密趣不漏而止餘見玉衡篇二曰提柱鍊銅以為砧圜者中規方者中矩砧之大入於筩也欲其密切而無滯也展轉之上下之猶是也當砧之心而設之孔孔之方圜孔之徑皆與筩底之孔等孔之上為之舌以掩之舌之制如筩底之舌也直木以為柱柱有二式一用長一用短用長者為實取之柱用短者為虚取之柱實取之柱其砧入於水而升降焉其長之度下及於筩之底上出於筩之口其出於筩之口無定度趣及於衡而止虚取之柱無用長入筩數尺而止升降於無水之處以氣取之欲挈之先注水於砧之上高數寸以閉其罅而噏之凡井淺者實取焉井深者虚取焉五分其筩之徑以其一為柱之徑砧之合於柱也鍊銅或鐵為四足隅立於方砧之四維方孔之四旁而皆上聚之聚之度趣不害於舌之開闔而止以其聚合於柱之下端合之欲其固也砧之厚以其枝於隅足也可無厚既合而入於筩砧降而底之舌為之掩砧升則開之開之則水入掩之則水不出一升一降是水恒入而不出也既入之水而砧降焉則無復之也則上衝於舌而入於砧之孔砧升而砧之舌為之掩一升一降是水恒入而不出也兩入而不出則溢於筩而出常如是虚者實者同於是故曰提柱者水所由恒升也注曰玉衡之提柱與壺之孔之舌為二此則合之又玉衡之水皆實取此有虚取之法焉氣法也凡砧之入於筩求密切而無滯也求密切之法成砧而入之能無漏者國工也不能無漏者稍弱其砧之徑以氊罽之屬皮革之屬附於砧之四周焉附之法若砧厚者稍剡其周之上下如鼓木當其剡而刻為陷環既附而堅束之砧薄者則為兩重之砧夾其氊或革以隅足貫之而𣙗之柱如本篇二圖之甲乙是也四足者丙丁戊酉也砧者己庚辛壬也砧之孔癸子也其舌丑寅也砧可無厚無厚則輕餘見玉衡篇三曰衡直木以為衡衡之長無定度量筩之大小水之淺深多寡焉長則輕衡之兩端皆綴之石以為重其兩重等五分其衡二在前三在後而設之鑿直木以為軸軸之長無定度圜其兩端中分其長而設之枘衡衡也軸縱也鑿枘而合之欲其固也軸之兩端各為山口之木而架之中分其衡之前而綴之提柱綴之欲其密切而利轉也抑其後重而提柱為之升揚其後重則前重降而提柱隨之也提柱之降也實取者挹水而升於砧也其升也則下入於筩而上出於筩也虛取者降而得氣焉氣盡而水繼之故曰衡者所以挈提柱上下之也注曰氣盡而水繼之者天地之間悉無空際氣水二行之交無間也是謂氣法是謂水理凡用水之術率此一語為之本領焉本篇三圖之甲乙衡也丙丁兩石重也戊己衡也子衡軸之交也庚辛壬癸山口之木也寅提柱也綴之於丑卯辰筩上端也午管也餘見玊衡篇四曰架木為井幹以持筩持之欲其固也筩之下端為盤以承之盤與筩合之欲其固也中盤而為之孔孔之徑稍强於筩底之孔之徑盤之下為鼎足而置之井底注曰本篇四圖之卯未辰午井幹也加於地平之上申戌酉亥之間為正方之空夾筩而持之丁戊井面地平也己庚井底也辛壬癸盤也辛子壬丑癸寅盤足也若欲為雙升之車則雙筩焉如玊衡之法而架之而升降之此升則彼降用力一而得水二也是倍利於恒升也尤宜於江河注曰力一水二者一升一降各得水一焉無虚用力也恒升者一升一降而得水一也架法見玊衡篇泰西水法卷二
