body:
  text: 泰西水法卷一明熊三拔撰用江河之水為器一種龍尾車記龍尾車者河濱挈水之器也治田之法旱則挈江河之水入焉潦則挈田間之水出焉治水之法淺涸則挈水而入方舟焉疏濬則挈水而出畚鍤焉不有水之器不得水之用三代而上僅有桔橰東漢以來盛資龍骨龍骨之制日灌水田二十畝以四二人之力旱嵗倍焉高地倍焉駕馬牛則功倍費亦倍焉溪澗長流而用水大澤平曠而用風此不勞人力自轉矣枝櫛一蓌全車悉敗焉然而南土水田支分櫛比國計民生于焉是賴即兹器所在不為無功已獨其人終嵗勤動尚憂衣食乃至北土旱災赤地千里欲拯斯患且有進焉今作龍尾車物省而不煩用力少而得水多其大者一器所出若决渠焉累接而上可使在山是不憂高田築為堤塍而出之計日可盡是不憂潦嵗與下田去大川數里數十里鑿渠引之無論水稻若諸水生之種可以必濟即黍稷菽麥木棉蔬菜之屬悉可灌溉是不憂旱濬治之功出水當五分之一今省十九焉是不憂疏鑿龍蟠之斗旱熯之年上源枯竭穿渠旁引多用此器下流之水可令復上是不憂漕也蓋水車之屬其費力也以重水車之重也以障水以帆風以運旋本身龍尾者入水不障水出水不帆風其本身無銖兩之重且交纒相發可以一力轉二輪遞互連機可以一力轉數輪故用一人之力常得數人之功又向所言風與水能敗龍尾之車也在鶴膝斗板龍尾者無鶴膝無斗板器居水中環轉而已湍水疾風彌増其利故用風水之力而常得人之功若有水之地悉皆用之竊計人力可以半省天災可以半免嵗入可以倍多財計可以倍足方於龍骨之類大畧勝之然而千慮之一以當起予可也智士用之曲盡其變不盡方來或者無煩覼縷焉龍尾者水象也象水之宛委而上升也龍尾之物有六一曰軸軸者轉之主也水所由以下而為上也二曰牆牆者以束水也水所由上也三曰圍圍者外體也所以為固抱也四曰樞樞者所以為利轉也五曰輪輪者所以受轉也六曰架架者所以制高下也承樞而轉輪也六物者具斯成器矣或人焉或水焉風馬牛焉巧者運之不可勝用也一曰軸圜木為軸長短無定度視水之淺深斟酌焉而為之度二十五分其軸之長以其二為之徑木之圜必中規而上下等以八繩附臬之法八平分其軸之周直繩而施之墨軸之兩端因直繩之兩端而施之墨八繩之交得軸之心也以八平分之一分為度以度八繩之墨皆平行相等而為之界以句股求弦之法兩界斜相望而墨為之弦弦之竟軸而得一螺旋之墨因螺旋之墨而立之牆為螺牆牆之間而得螺旋之溝為螺溝螺溝者水道也軸得一墨焉則得一牆焉一溝焉水得一道焉或二之或三之四之以上同於是多則均一則専惟所為之既牆而圍之既建而迤之而轉之水則自螺旋之孔入也水之入於螺旋之孔也水自以為已下也而不自知其已上也故曰軸者轉之主也水所由以下而為上也注曰圜與圓同量水淺深者下文言句四股三弦五則岸高九尺者軸之長當一丈五尺也凡作軸皆度岸高以三五之法準之二十五分之二者如軸長一丈則徑八寸如本篇第一軸立面圖己丁長一丈則丁丙之徑八寸也此畧言軸欲大耳若徑至三寸以上不嫌長丈八寸以上不嫌長二丈也軸過小則水為之不升八繩附臬者周禮樹八尺之臬縣八繩下垂皆附於臬今軸身作線大畧似之也八平分者如軸兩端圖甲乙丙丁戊圏為軸之周所分甲乙乙丙等八分者平分度也軸之兩端卧其軸各作己甲過心線依法分之即上下合也次於軸兩端之邊依所分各界兩兩相對各作平行直線八線附木皆平直是為八平分軸之周如立面圖己丁庚丙諸線是也次於兩端各作甲己丁丙諸線則得軸兩端之各庚心也以八平分之一為度者謂以甲乙為度從庚至辛作庚辛辛壬等短界線至丙而止八線皆如之各線之短界線皆平行皆相等也墨為之弦者從庚向癸依句股法作庚癸斜弦線内纒之至子外纒之至丑至寅至卯至辰斜纒軸面竟軸而止則得一螺旋線也單線則為單牆單溝也若欲為雙溝者則平分庚丑線得午從午外上向巳内下向未亦依法作螺旋線也若作四槽者又平分庚午於壬依法作之欲作三槽六槽九槽者先分軸為九平分欲作五槽十槽先分軸為十平分依法作之二曰牆軸之上因各螺旋之繩而立之牆牆之法或編之或累之皆塗之牆之兩端不至於軸之兩端其至也無定度惟所為之以樞之短長稱之八分其軸長以其一為牆之高可減也不可加也牆其累之也欲堅而無墮也其編之也欲密而平也其塗之也欲均而無罅也兩牆之間謂之溝溝水道也水行溝中而牆制之使無下行也故曰牆者所以束水也水所由上也注曰編牆之法削竹為柱依螺旋之線而立之每立一柱即與軸面之八平分長線為直角如立柱於本篇一圖之午即柱為垂線與庚丙長線為直角也而又與軸兩端之丙丁為一直線也若本篇二圖之癸丙是也削柱欲均安柱欲正列柱欲順立柱欲齊既畢則以繩編之畧如織箔之勢繩以麻或紵或菅或布或篾惟所為之既畢以􅄋青和蠟或和熟桐油融而塗之或以生桐油和石灰瓦灰塗之或以生漆和石灰瓦灰塗之凡􅄋青加蠟與桐油取和澤而止石灰瓦灰相半桐油或漆和之取燥濕得宜而止累牆之法取柔木之皮如桑槿之屬剝取皮裁令廣狹相等以􅄋青和蠟依螺旋之線層層塗而積之累畢如前法塗之既畢而兩牆之間成螺旋之溝水從溝行而牆不漏者是牆之善也八分之一者如軸長八尺則牆高一尺此亦畧言高之所至也一以下任意作之故曰可減不可増一法若欲為長軸則牆之高與軸之徑等三曰圍牆之外削版而圍之版欲無厚牆之兩端順牆柱之勢穿軸而立四柱焉依牆之高而束之環圍板之端入於環圍之外以鐵為環而約之長者中分圍之長以鐵環約之又長者三分其長以兩環約之圍之版其相合也與其合於牆之上也皆合之以塗牆之齊圍之外皆塗之以受雨露也圍其合也欲無罅圍之合於牆也欲無罅有圍故水入螺旋之孔而不絶無罅故水行於螺旋之溝而不洩則水旋而上也故曰圍者外體也所以為固抱也注曰圍之板量圍徑之大小與其長酌全體之重輕而制厚薄焉其長竟牆其廣一寸以上視圍徑之小大増損之太廣而合之則角見也其内面稍刳之以就牆之圓外面者圍既合而削之當牆之盡穿軸為四柱者所以居環而受圍也如本篇三圖之卯寅辰午等是也環以堅靭之木為四弧弧各加於環柱之上合之成環焉環之下方或為溝焉居中以受圍板之端或居外或居内為刻而受之如為溝於未此居中也為刻於申此居外也於酉居内也鐵環之束在兩端者與木環相抵卯午也戌亢也或中分約之者心斗是也若兩中環者則在尾與箕也或不用鐵環以繩約之而塗之齊與劑同合以塗牆之劑者􅄋青和蠟或油灰或漆灰也若塗圍之周者則漆灰為上油灰次之􅄋青和蠟者恐不耐暑日也為下而欲速成則用之欲解而時修則用之是者暑日架之則以苫蓋之水入於螺旋之孔者孔在環之内軸之外四柱之中戌亥角亢之間是也雖下向必入者以迤故水趨於圍也既其出則在卯寅辰午之間矣一法牆之兩端以二圓版蓋之開圍板之下端而水入之開上端之圓版而出之其效同焉四曰樞軸之兩端鐵為之樞當心而立之樞之用在圜輪在圍若在軸者皆圜之輪在上樞方其上樞之上輪在下樞方其下樞之下方之者以居輪立樞欲正欲直不正不直者輕重不倫也既正既直輕重均轉之如將自轉焉則雖大而無重也故曰樞者所以為利轉也注曰當心者本篇一圖之庚心也樞之大小長短無定度量全體之輕重制大小焉量輪之所在與地之所宜制短長焉輪所在者有七下方詳之也方則止故可以居輪正者當庚之心直者與軸端圓面為直角與軸上八平分線俱為一直線也求正尚有軸端諸線可憑求直稍難焉今立一試法視一圖軸兩端諸分線以規一抵軸端邊之乙一抵樞之頂心為度次去乙抵戊量之又去戊抵己量之皆至於樞之頂心者即樞直也如將自轉者戚速之甚也五曰輪輪有七置輪有三式七置者當圍之中焉圍之兩端焉軸之兩端焉兩樞焉在圍者夾其圍而設之輻輻之末周之以輞焉輞樹之齒焉在軸與樞者方其處而入之轂轂樹之齒焉凡輪皆以他輪之齒發之其疾徐之數視輪與他輪之大小焉其齒之多寡焉故輪欲密附而少為之齒輪附而齒少他輪大而齒多則其出水也必疾矣故曰輪者所以為受轉也注曰輪有七置者因地勢也量物力也相大小而制徐疾也在圍之中者本篇四圖之丁是也在圍之兩端者丙與戊是也在軸之兩端者乙與己是也在兩樞者甲與庚是也若車大而軸長出水之地高則在丁矣若平地受水而用人力畜力風力者當在甲乙丙矣用水力當在戊己庚矣夾圍之輻子丑之類是也辛者容圍之空也壬癸輞也寅卯之類齒也方其處者軸與樞當受轂之處也辰入樞之空也戌入軸之空也午轂也酉亦轂也未申亥角之類皆齒也他輪者或人車或馬牛驘車或風車或水車之輪也此諸車之輪者非謂其大卧輪也蓋指接輪焉接輪者農家所謂撥子是也試言人車則有卧軸也卧軸之一端有接輪卧軸之上有拐木也今於甲乙丙任置一輪焉如置在軸之乙輪即以卧軸之接輪交於乙輪人踐拐木而轉之接輪與乙輪相發也若馬牛驘車及風車則有卧軸也卧軸之兩端皆有接輪今以其一交於乙輪以其一交於彼車之大卧輪駕畜焉颿風焉而轉之接輪與乙輪相發也若水轉之車則有卧軸也卧軸之一端有接輪卧軸之上有立輪立輪之外有受水之箑也今於戊己庚任置一輪焉如置在軸之己輪即以卧輪之接輪交於己輪水激於箑而卧軸為之轉接輪與己輪相發也疾徐之數與他輪相視者如乙己之輪齒十二人車之接輪齒十二是拐木一轉而得一轉也如樞輪之齒八而人車之接輪齒十六是拐木一轉而得二轉也人車之接輪齒二十四是一轉而得三轉也若樞輪之齒八而駕畜颿風之卧輪齒七十二是一轉而得九轉也故曰輪欲密附密附則齒為之少他輪欲大大則齒多然而密者過密焉則力為之不任大者過大焉則遲故曰因地勢量物力相大小而制徐疾焉今圖樞輪之齒八軸輪十二圍輪十六約畧作之非定率也趣欲使兩輪之交疎密相等焉長短相入焉相闗相發而不滯則足矣其小者欲無用輪方其樞之末别為衡衡之一端入於樞焉其一端植之柱焉柱之體圓又為之掉枝而首為圓孔焉以掉枝之圓孔入於柱而轉之若大者而欲無用輪則以兩掉枝同加於柱兩人對執而轉之最大者兩掉枝之末各為持衡四人或六人對持其衡而轉之六曰架架者一上一下皆為砥柱或木焉或石焉或瓴甋焉柱之植欲堅以固也下柱居水中以鐵為管施之柱首迤而上向以受下樞之末制管高下量水之勢令得入於螺溝之下孔而止也上者居岸以鐵為管施之柱首迤而下向以受上樞之末若輪與衡在上樞之末者則中樞而設之頸以鐵為山口而架樞其上出其樞之末以受輪與衡也制高下之數以句股為法而軸心為之弦弦五焉則句四焉股三焉過偃則不高過高則不升注曰瓴甋磚也堅者其本體堅固者其立基固也上柱者本篇五圖之甲乙是也下柱者丙丁是也上管以受上樞戊也下管以受下樞己也句股法者一高一下如四圖之亢房線而置之令上樞之末在亢下樞之末在房也三四五者如上樞之末為亢至下樞之末為房長一丈如法置之則自下樞之末房依地平作平行線自上樞之末亢作垂線而兩線相遇於氐其亢氐線必長六尺氐房線必長八尺也若迤建於岸之側謂無從作垂線者則以句股法反用之以圍板為倒弦别作一尾箕垂線為股尾為直角作尾心横線為倒句若尾箕長一尺五寸偃仰移就之令尾心長二尺即心箕必二尺五寸而亢房線必合三四五之句股法也凡圍板長一丈水高必六尺求多焉不可得相水度地制器者以此計之若水過深岸過高器不得過長則累接而上之累接之法亦以接輪交而相發也泰西水法卷一
