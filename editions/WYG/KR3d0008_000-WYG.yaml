body:
  text: 泰西水法農家類提要臣等謹案泰西水法六卷明萬厯壬子西洋熊三拔撰是書皆記取水蓄水之法一卷曰龍尾車用挈江河之水二卷曰玉衡車附以専筩車曰恒水車附以雙升車用挈井泉之水三卷曰水庫記用蓄雨雪之水四卷曰水法附餘皆㝷泉作井之法而附以療病之水五卷曰水法或問備言水性六卷則諸器之圖式也西洋之學以測量步算為第一而竒器次之竒器之中水法尤切於民用視他器之徒矜工巧為耳目之玩者又殊固講水利者所必資也四卷之末有附記云此外測量水地度形勢髙下以决排江河蓄洩湖淀别為一法或於江湖河海之中欲作橋梁城垣宫室永不圯壞别為一法或於百里之逺疏引源泉附流灌注入於國城分枝析脈任意取用别為一法皆别有備論兹者専言取水未暇多及云云則其法尚有全書今未之見也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:215ed3ab6d24122a909047807968b87628d404b96ee007ddb66615f40190db99
