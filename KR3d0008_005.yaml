body:
  text: 泰西水法卷五明熊三拔撰水法或問既作水器諸公見之每辱奬歎時及水理有所酬對序而錄之第四行論辨更僕未悉垂問所至則舉一二若絲抽蔓引為緒又長故每從截説非能連貫也或問海為水之本所何謂也曰造物之初渾淪剖判四行之物各有本所火之體質最為輕妙居最上矣氣輕於水居火之次水之體質稍輕於土附地居焉惟地形質獨為至重凝結水下萬形萬質莫不就之水既在地地有崇卑海之為處於地甚卑故百川㑹焉滙為巨壑也問地居水下即水之下全為頑土乎曰不然四行之中惟火至純不受餘物而能入於餘物其外三行皆能相容相受矣水受三行如海水夜明燒酒能爇有火分也水體同重為酒則輕有氣分也積雪消之沙土下凝有土分也氣受三行如雲氣上升激成雷電有火分也隂霾晝晦黄霧四塞有土分也雨露雪霜虚升實降有水分也地體雖重于重之中又分虚實地中最重蓋在其心自心而外漸有虛所虚所之内三行得入試觀山下洞穴宛轉相通大地空所亦同斯類矣空虚之中是氣本所氣與水火皆相接無際而能相化地既空虚空虚之所無不是氣故地中有氣也氣與水接水隨氣到即水所不到而土情本冷氣遇其冷亦化為水故地中有水也日為大光萬光之主光徹于地則生溫熱溫熱入地積成燥乾燥乾之極乘氣為火積火所然土石為燼復乗氣出共成炎上隔于雲雨鬱為雷霆升于晶明上成彗孛此二物者火之精微别有洞穴上通全體俱出則為西國大山蜀中火井若遇石氣滋液發生則成硫黄泉源經之即為溫泉火道所經鎮壓不出則為火石故地中有火也氣水在地皆因空虚雖居洞穴終是地上實亦未嘗離其本所火在地中非從本所而降蓋由熱生以成濟萬物因緣上升仍歸本所遂其本性焉問海水必鹹何也曰鹹者生於火也火然薪木既已成灰用水淋灌即成灰鹵燥乾之極遇水即鹹此其驗也地中得火既多燥乾燥乾遇水即成鹹味鹹者之性尤多下墜試觀五味辛甘酸苦皆寄草木獨是鹹味寄于海水足徴四味浮輕鹹性沈重矣今蜀道鹽井先鑿得泉悉是淡水以筩隔之更鑿數丈乃得鹵焉又鹽池雨多水味必淡作為斗門洩其淡水下乃鹵焉鹹重淡輕亦其證也海于地中為最卑下諸鹹就之積鹹既多淡入亦化非獨水也海中山岳或悉是鹽故鹹重歸海海水為鹽也問鹹既因火火因于日日遍大地大地之下悉有鹽乎曰豈不然乎蜀道鹽井三晉鹽池西國有海名曰地中實不通海而是鹹水西戎北狄多有鹽澤彼以鹹故悉名為海足徴大地之下無不有鹽矣問鹽既下墜蜀井可徴則凡鹽所出宜悉在下乃今鹽池鹽澤去地非遙不如蜀中之井深數十丈何也曰鹹生于火火淺鹹淺火深鹹深平原澤國火不地見鹽不地出惟是高山峻嶺上多亢陽下多洞穴地中有火即成鹹焉今蜀中鑿井求鹽或得火井井中之火覆蓋則滅然火投之隨而上焉是則井火在下與水同深遇水成鹵不遇成火矣晉中河曲乃有火石火石恒熱大行河西亦産硫黄可見晉中火淺故晉有鹽池亦在淺土又有小鹽刮地作之畧加硝鹻也西地中海其水亦鹵周數千里在其側近遂有火山高數千丈其上火穴徑千餘步厥火炎上古今不絶足徴鹽之與火相切則成亦復相視以為淺深也問水遇于火既得成鹹云何不熱溫泉乃熱既由于火云何不鹹曰鹵水不熱向言之矣火熱所炎既成灰燼水經其燼因而得鹹云何有熱今火燼成灰漉灰得鹵無有熱也然而海水不冰亦具有熱性矣火在地中助于土氣發生萬物五金八石及諸珍寶皆由于火陶煉而成自餘諸物不可數計諸物之中最近火性者無如硫黄硫黄所在水從過之則成溫泉故溫泉沐浴所能療者冷氣虚痺與硫同治然火能成硫硫即非火水因硫溫隔越于火如鐺煮水火為鐺隔水不遇灰不成鹵矣今溫泉嗅之多作硫氣亦有不作硫氣者是水來之處復與硫隔如重湯煮物但得其熱不染其味也或云不作硫氣者本之朱砂礜石無是理焉問鹹既火生何不隨火炎上顧令下墜火所在上何以抑遏使居地中造物之主豈有意乎曰豈無意乎鹹能固物使之不腐却能斂物使之不生火在地中藉其溫煖多所變化儻居地上任其焚燒有何不滅若火與鹹俱令在地動植之物悉皆泯矣故日光生熱因熱生火旋用水土壅閼恒使在下助生萬物有時有處間一發見即歸本所不得一時游行地上偶一游行目為災異也因火生鹹亦令性重恒居在下歸藏于海為人作味不令侵出地上以為物害也且海益于人不止作味鹹水生物美于淡水故海中之魚㫖于江河之魚鹹水厚重載物則强故入江河而沈者或入海而浮也此皆用海為人利益故鹹水恒重因重歸海也問海水潮汐者何也曰察物審時窮理極數即應月之説無可疑焉月為隂精與水同物凡寰宇之内濕潤隂寒皆月主之既其同物勢當相就月為濕本濕能下施故方諸對月而得水焉月既下濟水亦上行欲就于月故月輪所至水為之長而成潮汐也當潮長時江河溪澗以及盆盎無處不長長則氣入水為之輕潮降氣出水復故重今人以缾盛水每日權之輕重不等則潮升時輕潮降時重耳獨小水之處升降甚微人所不覺海水既大灌注江河升降盈涸事理顯然故獨稱海潮也不獨水矣凡水族之物月望氣盈晦即氣縮故月虚而魚腦減月滿而蚌蛤實也又不獨水族矣草木百昌茍資濕潤以為生氣無不應月虧盈月滿氣滋月虚氣燥故上弦以後下弦以前不宜伐竹與木以為材用是者易蠧生氣在中也下弦以後上弦以前伐而為材即不作蠧為少脂潤空質而已亦猶春夏氣滋秋冬氣斂斧斤時入之意也由此而言月為水主月輪所在諸水上升海潮應月斯著明矣問江河之水則能滅火海水入大火如益膏油既不能滅而反熾盛何也曰海水之鹹本從熱乾而生由燼灰而出即自具有熱乾之性亦且挾有燼灰之體凡物熱乾多易生火硝硫之類是也灰水作鹹本從火出人溺亦鹹蓋由身中具有火行畜溺亦鹹犬馬火畜積溺所成絶似硝鹻故鹻者火情也鹵不減火而反熾盛以此故焉問海水浮物强于江河之水嘗見海舟載物未増入于江河驗其水痕頓深尺許又見海濱煎户以石蓮試鹵鹵未成時投蓮必沈及至鹵成蓮悉浮矣三入三浮乃登牢盆以見鹹性愈重載物愈强此為何故曰海水由火而生今用沐浴膚皆赤色或至皴裂燥熱之效亦已明矣燥熱之情本自堅勁加有鹹味中挾燼灰微妙之分比之凡水稠而密理故載物獨强也問鹵水之燥因于燼灰信其然矣今以乾灰一升别置水一升挹水入灰水盡不溢灰亦如故既是寒灰豈能損水水既不損灰豈無質二升并一絶不加多其故何也曰灰雖有形而質器已盡多是虚體體中無處不虛故水皆滲入其質存者亦有微分緣其燥情畧能損水水損微分與灰存質適足相當故二升并一不加多也問人溺作鹹人汗亦鹹其故何也曰人飲水漿茶酒之屬其中精粹是為上分上分者因于真火宣越流通化為四液畧見四元行論筋脈受之髓骨肌肉賴其長養此如水氣成雲離于燥鹹矣其中粗濁是為下分下分者重墜沈墊燥鹹在焉筋脈不受入于膀胱由下竅出故溺味恒鹹也若暑月炎酷或作務煩勞中外皆熱真火所煉去其上分所存下分挾有燥鹹不入筋脈未下膀胱因于熱煎横溢而出則成汗矣汗亦溺類故夏月汗多則溺少冬月汗少則溺多也譬于大地鹹之本所故是大海熱乾所化宜流于海火盛煎逼溢地而出鹽池鹽井汗之屬乎膀胱水海義亦相類矣問人熱而汗于理允矣人病亦汗此為何因病中之汗又分冷熱久病汗冷新病汗熱又何故也曰人身水飲上分為液下分為溲畧言之矣若恣飲無節過其度量或本無過度而脾胃虚弱二者皆不及運化運化所餘上不成液下不成溲因而留滯是名剩液剩液者液之不良分也此物留滯客于脾胃實惟真火可以消之若節嗇珍養真火力盛漸次消盡安隠無疾若有積無消而致溢出必化為汗積液過多真火又微不能勝之其汗則冷冷汗多淡為火微故積液既少真火能勝汗乘火出亦熱亦鹹液盡疾瘳也醫家或以吐下當汗皆求去其剩液而已問海為水所水性就下歸于海矣江河之地視海為高江河之水反從高出何自來乎曰江河者生于海者也何以知之曰江河終古入海而海不溢故知海水之下地脈潛通復為江河也海水既鹹復為江河其味則淡何也曰水為元行元行無味鹹非水體從外合焉凡可合者即復可離海水入地經砂石土滋液滲漉去其鹹味又水性在下不可得上其從下而上得為江河者或受日溫隨氣上騰或受月攝因時而長當其上時皆如蒸餾今用鹻鹵之水如法蒸之所得餾水其味悉淡海中之水蒸氣成雲海雲作雨雨亦淡焉足徴鹹性就下不隨淡升矣有此二端故江河復淡也亦有山下出泉積聚成川沿流㑹合成其深廣今人疑江河之水悉本山泉不知江河之底以及平地隨處出泉開河鑿井足為徴驗不盡由山也若雨雪之水山阜田原悉歸江河以注于海此理甚著無勞詮説問山下出泉者何也曰凡物之情皆欲化異類為己同類也兩物相切弱者受變兩强相切少者受變故四行俱能相變焉凡山皆以石為體自非石體昔當胚渾之際不成山也因其石體下有洞穴洞穴之内純得土性其處最寒矣天地之間悉無空際凡有空處氣悉滿焉洞穴既空為氣所入氣情本煖煖氣遇寒變成水體積久而洩㝷求石罅乘氣出焉亦有洞穴深長潛引地脈海水相通因而攝受不須氣化積漸而成者故曰山澤通氣山下出泉也問掘井得泉何也曰凡地之中必有水伏流焉其源也或本于海或本于泉其委也或入于河或入于海皆有條理宛如人身脈絡砂土之脈其行散漫俗稱溝水溝水之來廣或㝷丈深一二寸山石之脈其流專一俗稱泉眼泉眼所出或經寸許乃至數寸故掘井者惟下地澤國所在得泉不論脈理其他山鄉高亢必㝷水脈不得水脈終不及泉㝷脈之法畧見上方矣有工于井者辨視石色即知泉眼所在如玊人辨璞也既知泉眼即留取不鑿迨下方工畢鑿石出泉用力既省積水甚多問近海出鹵而掘地得泉有鹵有甘何也曰地中之脈有萬不齊掘井得水視所由來若此泉脈由河入海則是甘泉由海入河即鹵泉也問井中之水夏寒冬熱何也曰三夏之月日暴于地地上數尺其熱欲焦冬月氣寒加以飄風夏熱在土為寒所逼下入于地井水成煖三冬之月積寒于地迨夏暑熱冬寒在土復為熱逼下入成寒非冬煖夏寒各從下上也煖情為火氣火氣無時不上升焉寒情為水土水土無時不下降焉問雨者何也曰日光照地既成溫熱溫熱薄于水土蒸為濕氣氣情本煖煖者欲升復得日溫鬱隆騰起是有火行火所燔爇飄颺如煙復挾土體相輔上行氣行三際畧見四元行論中際甚冷氣升離地漸近冷際因于水土本情是冷是濕結而成雲是一雲體中具有四行也凡物體具四行及將變化勝者為主雲至冷際冉冉將化本多濕情濕情若勝即化為水水既成質必復于地地為大質萬質所歸有質之物無緣離地可得頓置也正如蒸水因熱上升騰騰作氣雲之屬也上及于蓋蓋是冷際就化為水既已成水便復下墜雲為行雨即此類焉若水土濕氣既清且微日中上升即為風日所乾迨至夜時升至冷際乃凝為露夜半以後去昨已逺寒氣微深亦如一嵗之寒盛于日至之後也當其寒時氣升稍重故晨露尤繁夜有烈風亦受風損故風盛即露微矣若長夏大旱了無濕氣則夜中并無露焉問雲生必為雨乎有密雲不雨者有旱雲益旱者何也曰氣升不等所具四行各有偏勝故或為霾霧或為雷霆彗孛也豈必氣升皆雨乎風之為物亦是熱乾與雷霆彗孛一本所生但不得直升横騖地上此為異耳雲雖濕熱上升遇冷凝結所成變化為雨是其常分但旱暵之時氣行大體多是燥乾雲起于地孤行獨上雖至中際無有濕性與相協助尚未化雨濡滯之間或遇大風飄向他方成他方之雨或本體之中濕情既微風性燥烈遂泯其濕徒存燥乾上為奔星耳所以晴日雲高而反不雨大旱之年山雲屹峙行復散失徒見流光有嘒其明也若氣行大體濕性既多雲起于地遇其冷濕不能直上遽化為水故雲近于地反得雨焉每有高山之上俯瞰雲雨皆在其下下視震雷如水發漚也問雨水勝于地上之水何也曰日照于地水土之氣蒸而成雲是水之精華如燒酒藥露皆以清升徴其粹美也其中有火土氣之情既化為水各相分背矣凡水畧經撓動即清升濁降雨之為物上騰下降撓動已極全得其清故雨水為良也地上之水美惡不等地中所有以及所生水一過之即為染著受其氣味蓋地上元行真水百無一二比之雨水故為劣焉問雪者何也曰雪者與雨同理故將雪之日必先微溫不溫氣不上升也惟冬之月冷際甚冷氣至其際變為雪焉露之為霜其理畧同也問雪花六出何也曰凡物方體相等聚成大方必以八圍一圓體相等聚成大圓必以六圍一此定理中之定數也凡水居空中在氣行體内氣不容水急切圍抱不令四散水則聚而自保自保之極必成圓體此定理中之定勢也氣升成雲雲遇冷際變而成雨因在氣中一一皆圓初圓甚微以漸歸併成為㸃滴雨既水體既并復圓未至地時悉皆圓㸃冬時氣升成為同雲遇冷而變亦成圓體既受冷侵一一凝冱悉是散圓及至下零欲求歸併却因凝冱不可得合聊相依附求作大圓以六圍一即成花矣曰既因依附求成圓體就不相合亦宜摶聚云何成片而復六出平輳即合直輳即離其故何也曰地體不動天行左旋日行一周火在氣上亦隨天運氣體近地依地不動上近火者隨火旋焉冷際亦動動勢神速難可思惟有物遇之如鋸出屑雪既凝結受其摩蕩平中輳合尚得自由直處逢迎勢不可得正如濕米磨粉易令作片難以成摶也問雨水與雪水熟勝曰雨水勝何故曰水為元行不雜他味方為真水雨從雲出雲從氣升氣非日蒸不致上騰當其上騰挾有火情火情熱乾熱乾炎上其勢壯猛土之精者亦隨而上故興氣成雲一雲之中具有四行但時有偏勝水勝時多耳間或火土合氣水情絶少力勢既盛土之次分亦隨而上上遇冷際力勢稍微土之次分復歸于地則成霾霧若火土自升水雲復盛火土上行阻于隂雲難歸本所隂雲逼迫既不相容火土之勢上下不得亦無就滅之理則奮迅决發激為雷霆是其破裂之聲電是火光火迸上騰土經火煉凝聚成質質降于地是為劈厯之楔矣就其隂雲之中亦有火土二體上遇冷際為水所勝氣變成水火情挾土能在氣中與之俱上是則土之上妙者也熱燥輕微與火為體火性炎上初隨氣升氣既變水水將就下火土二體不復從之如蒸水成氣氣至甑蓋化而為水仍歸釡中若其熱性自能透甑而出不復就下矣既與雨分火土相挾决起而上亦有火土自升不遇隂雲不成雷電淩空直突者此二等物至於火際火自歸火挾上之土輕微熱乾畧似炱煤乘勢直衝遇火便燒狀如藥引今夏月奔星是也其土勢太盛者有聲有迹下及于地或成落星之石與霹厯同理焉若更精更厚結聚不散附于火際即成彗孛附麗既久勢盡力衰漸乃微滅矣是則雨從雲降分于火土亦無有氣故雨為元行真水其味特勝也若雪天之雲與雨雲等亦具四行獨是冬月冷際甚冷火至其處勢亦稍殺土雖輕微其勢不能挈與俱上一時雲氣驟凝為雪土亦與焉火雖獨歸其所雪中之土仍與同性畧如灰燼炱煤之屬故大雪時試取純雪融化為水下有微細沙土所融雪水仍作燥乾之味不然雪遍大地塵土被壓所取淨雪不雜地上之土融水得沙自何而來故雪水不如雨水中有火土二情也若融化既久澱去沙土離于二情亦成元行真水與雨水同焉又氣方上升未盡化水遽凝為雪有氣雜揉雪體輕虚職由于此矣問冬雲成雪既由冷際極冷春秋成雨當由冷勢稍減乎即三夏之月愈宜減矣乃夏月之雹有絶大者傷及人畜壓損田苗比于冬雪十百倍之敢問雹由冷乎熱乎若由冷也冬何不雹若由熱也熱反凝冰此理何由請聞其説曰氣有三際中際為冷即此冷際下近地溫上近火熱極冷之處乃在冷際之中自下而上漸冷漸極二時之雨三冬之雪蓋至冷之初際即已變化下零矣不必至于極冷之際也所以然者冬月氣升其力甚緩非大地興雲不能相扶以成其勢故雲足甚廣雲生甚遲必同雲累日徐徐而起漸至冷際漸亦凝沍因而結體甚微細也自餘二時凡雲足廣濶雲生遲緩即雨勢舒徐雨滴微細亦皆變于冷之初際矣獨是夏月鬱積濃厚决起上騰力專勢鋭故雲足促俠隔塍分壠而晴雨頓異雲起坌涌膚寸暫合而溝澮旋盈蓋因其專鋭故能逕至于冷之深際若升氣愈厚即騰上愈速入冷愈深變合愈驟結體愈大矣若其濃厚專鋭之極遽升遽入抵于極冷極冷之處比于冬之初際殆有甚焉以此驟凝為雹雹體小大又因入冷深淺為其等差愈速愈深當愈大也是以雹災所至自有畦畛因其專狹雹雲上升與雨雲異因其迅猛善審觀者見雲生有異知當是雹可得亟避矣雹興夏月火土之體加雪數倍雹因驟凝土隨在焉故雹中沙土更多于雪因其驟結并氣包焉故雹體中虚虚者是氣惟雪與雹皆體具四行未相分背與雨水特異也問器中貯水曽無漏渫貯以冰雪外成濕潤何也曰水土而上氣行充塞凡器之外悉皆氣也冰雪甚寒氣暖在外暖因寒逼漸變成水雲至冷際而變為雨氣入地中而變為泉是其類焉問灌溉草木不論用河用井皆須早晚而避午中何也曰灌溉草木多在夏月正午炎歊于時用水如以熱湯則傷其根故灌必早暮或作池畜水乘夜發之如是説者旱種則然若水種者惟懼過寒是生食節之蟲故不避日中而忌夜灌積雨太冷宜洩去之山泉初出滙以塘池既受日暘而後灌之或作池畜水晝日發之問向者水法委屬利便力少功多矣第江河不得求之井泉井泉不得求之雨雪兼之江河井泉亦待雨雪以増其潤究竟農民所急當在雨矣然而雨暘時若不可嵗得水旱蟲蝗或居强半不知何術可得豫知以為其備乎曰天災流行事非偶值造物之主自有深意若諸天七政各有本徳所主本情所屬因而推測災變厯家之説亦頗有之然而有驗不驗焉蓋數術之贅餘君子弗道也儻居人上者果有意養民欲為其備則經理山川興修水利勸課農桑廣儲粟糓阜通財貨即水旱災傷自可消弭太半脱值不虞有備無患矣又何事前知為乎且水旱不齊大畧一災二稔十年之中宜為三年之備必于不免知與不知又何異焉問田家有術以知一時晴雨有之乎曰此則無闗數術殆四行之實理也究極言之百端未罄畧舉一二餘可推焉其一曰竈突發煙平逺望之亭亭直上旱徴也蜿蜒而起如欲上不得者雨徴也何故曰水土之氣上騰為雲雲凝在上未成為雨空中氣行悉皆燥乾故令火煙直上無礙雲將成雨空中氣行皆成濕性煙為濕礙不得上升令其宛曲也將雨土石先潤以此將雨礎潤以此將雨燈爆以此又問曰朝日出光黯淡色蒼白者雨徴也何故曰晴明之辰氣行清淨作玻瓈色日則晶明無有障隔將雨水濕上升氣稍稠濁光則黯淡也蒼白者水色也又問曰日出時雲多破漏日光散射者雨徴也何故曰氣升作雲未成為雨體凝質密及至成雨體質消化故輕薄透漏也又問曰密雲四布牛羊齕草如常者不雨若啖食匆遽似求速飽雨徴也蠅蚋蚊虻匆遽咂食雨徴也蠉蜎之屬倉皇飛騖雨徴也穴處之蟲羣出于外雨徴也何故曰濕氣上升凡是諸物皆能先覺也又問曰朔日至于上弦視月兩角近日一角稍稍豐滿雨徴也月暈白主晴赤主風色如鉛者雨徴也何故曰月輪在上本無有暈受氣籠罩是生暈焉若氣行清淨星月皎然乃無暈矣因氣而暈若白色者水分猶少乃得不雨赤是火分故為烈風若如鉛者氣受水濕其色然也月角厚薄者日暴水土其氣上騰近日則厚也泰西水法卷五
